mode: manual

llm:
  provider: "openai"
  model: "gpt-4o-mini"
  api_base: null
  reasoning_effort: "high"

cache:
  enabled: true
  decision_ttl_seconds: 300

policy:
  auto_allow_threshold: 0.85
  review_threshold: 0.70
  domain_allowlist: []
  domain_denylist: []
  # Empty: any absolute upload path is allowed (local UI / replay). Set roots (e.g. ["${HOME}/Downloads"]) to harden.
  upload_root_allowlist: []
  allow_file_urls: false

storage:
  sqlite_path: "runs/agent.sqlite"
